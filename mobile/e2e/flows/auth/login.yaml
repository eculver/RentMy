appId: ${APP_ID}
name: "Auth - Login (happy path)"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Clear ALL app state + keychain (auth tokens stored via expo-secure-store).
- clearState
- clearKeychain

- launchApp

# Expo Dev Client: tap the dev server to load the JS bundle
- tapOn:
    text: "http://localhost:8081"
    retryTapIfNoChange: false

# Dismiss Expo Dev Client welcome overlay
- extendedWaitUntil:
    visible: "Continue"
    timeout: 15000
- tapOn: "Continue"

# Close the Expo dev tools panel (tap × button)
- tapOn:
    point: "88%, 37%"

# Wait for the login screen to appear
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000

# Enter credentials
- tapOn:
    id: "input-email"
- inputText: ${RENTER_EMAIL}

# Tap password field directly (hideKeyboard triggers autofill gesture conflicts on iOS 26)
- tapOn:
    id: "input-password"
- eraseText: 30
- inputText: ${RENTER_PASSWORD}

# Dismiss keyboard by tapping outside the form
- tapOn:
    point: "50%, 20%"

# Submit
- tapOn:
    id: "btn-sign-in"

# Dismiss iOS "Save Password?" prompt if it appears
- extendedWaitUntil:
    visible: "Not Now"
    timeout: 10000
    optional: true
- tapOn:
    text: "Not Now"
    optional: true

# Wait for navigation to the feed screen after login
- extendedWaitUntil:
    visible:
      id: "screen-feed"
    timeout: 10000
