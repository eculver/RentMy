appId: ${APP_ID}
name: "Handoff - Check-in (GPS + PIN + photos → ACTIVE)"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Prerequisites:
#   - Backend running with E2E_MODE=true
#   - App built with EXPO_PUBLIC_E2E_MODE=true
#
# Seeds an ACCEPTED booking. The host's CHECK_IN proof is pre-inserted with
# PIN="1234" and verified=true. The renter then:
#   1. Verifies GPS (E2E: backend bypass accepts any coordinates)
#   2. Enters PIN "1234" (E2E: single-input field)
#   3. Takes 3 fixture photos (E2E: camera bypass)
#   4. Completes check-in → booking transitions to ACTIVE

# ── 1. Seed an ACCEPTED booking ──────────────────────────────────────────────
- runFlow: e2e/helpers/seed-booking-accepted.yaml

# ── 2. Login as renter ───────────────────────────────────────────────────────
- runFlow: e2e/helpers/login-as-renter.yaml

# ── 3. Navigate to Rentals tab ───────────────────────────────────────────────
- tapOn: "Rentals"

- assertVisible:
    id: "screen-rentals"
    timeout: 5000

# ── 4. Tap the booking row ───────────────────────────────────────────────────
- tapOn:
    id: "rental-row"

- assertVisible:
    id: "screen-booking-status"
    timeout: 5000

# ── 5. Assert ACCEPTED status and Start check-in button ──────────────────────
- assertVisible:
    id: "booking-status-label"

- assertVisible: "Booking accepted"

- assertVisible:
    id: "btn-start-checkin"

# ── 6. Tap Start check-in ────────────────────────────────────────────────────
- tapOn:
    id: "btn-start-checkin"

- assertVisible:
    id: "screen-check-in"
    timeout: 5000

# ── 7. Verify GPS (E2E mode: backend accepts any coordinates) ─────────────────
- assertVisible:
    id: "btn-verify-location"

- tapOn:
    id: "btn-verify-location"

- assertVisible: "Location verified"
  timeout: 6000

# ── 8. Enter check-in PIN (E2E mode: single text input) ──────────────────────
- tapOn:
    id: "input-pin-e2e"

- inputText: "1234"

- assertVisible: "PIN verified"
  timeout: 6000

# ── 9. Take 3 fixture photos ─────────────────────────────────────────────────
- tapOn:
    id: "btn-open-camera"

- assertVisible:
    id: "camera-e2e-bypass"
    timeout: 4000

# Add 3 fixture photos in a single camera-open session
- tapOn:
    id: "btn-e2e-use-fixture"

- tapOn:
    id: "btn-e2e-use-fixture"

- tapOn:
    id: "btn-e2e-use-fixture"

# Return to check-in screen
- tapOn:
    id: "btn-e2e-continue"

- assertVisible:
    id: "screen-check-in"
    timeout: 4000

# ── 10. Complete check-in ────────────────────────────────────────────────────
- tapOn:
    id: "btn-complete-checkin"

# ── 11. Assert booking transitioned to ACTIVE ─────────────────────────────────
- assertVisible:
    id: "booking-status-label"
    timeout: 8000

- assertVisible: "Rental in progress"
