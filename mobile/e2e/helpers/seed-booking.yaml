appId: ${APP_ID}
name: "Helper - Seed a REQUESTED booking via API"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
---
# Calls the test-only backend endpoint (POST /api/v1/test/booking) to create
# a booking in REQUESTED state without going through the Stripe payment flow.
#
# Requires: backend running with E2E_MODE=true
#
# After this helper runs, ${TRANSACTION_ID} is available in the calling flow.

- runScript: e2e/scripts/seed-booking.js
  env:
    API_URL: ${API_URL}
    RENTER_EMAIL: ${RENTER_EMAIL}
