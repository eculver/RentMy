appId: ${APP_ID}
name: "Disputes - File a dispute from an active rental (happy path)"
env:
  APP_ID: com.rentmy.app
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Prerequisites:
#   - Backend running
#   - App built with dev client: npx expo run:ios
#   - setup.sh run (test accounts + bookings exist, including ACTIVE booking)
#
# Flow: login as renter → Rentals tab → tap ACTIVE row → active-rental screen
#       → tap "Report an issue" → dispute screen → select DAMAGE reason
#       → enter description → submit → dispute-status screen renders.

# ── 1. Login as renter ───────────────────────────────────────────────────────
- runFlow: ../../helpers/login-as-renter.yaml

# ── 2. Navigate to Rentals tab ────────────────────────────────────────────────
- tapOn:
    text: "Rentals, tab.*"

- extendedWaitUntil:
    visible:
      id: "screen-rentals"
    timeout: 5000

# ── 3. Tap the ACTIVE rental row → active-rental screen ──────────────────────
- extendedWaitUntil:
    visible:
      id: "status-active"
    timeout: 5000

- tapOn:
    id: "status-active"

- extendedWaitUntil:
    visible:
      id: "screen-active-rental"
    timeout: 6000

# ── 4. Tap "Report an issue" to open the dispute filing screen ────────────────
- scrollUntilVisible:
    element:
      id: "btn-report-issue"
    direction: DOWN

- tapOn:
    id: "btn-report-issue"

- extendedWaitUntil:
    visible:
      id: "screen-dispute"
    timeout: 5000

# ── 5. Select the DAMAGE reason ───────────────────────────────────────────────
- tapOn:
    id: "dispute-reason-DAMAGE"

# ── 6. Enter a description (minimum 10 characters) ────────────────────────────
- tapOn:
    id: "input-dispute-description"

- inputText: "The frame was visibly dented on the left side upon return."

# Dismiss keyboard by tapping a visible non-interactive element above keyboard.
# The ScrollView has keyboardDismissMode="on-drag" so scrolling also dismisses.
- tapOn: "What happened?"

# ── 7. Scroll to submit button and tap ────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "btn-submit-dispute"
    direction: DOWN

- tapOn:
    id: "btn-submit-dispute"

# ── 8. Dispute-status screen renders with timeline ────────────────────────────
- extendedWaitUntil:
    visible:
      id: "screen-dispute-status"
    timeout: 8000

- extendedWaitUntil:
    visible:
      id: "dispute-timeline"
    timeout: 5000

- extendedWaitUntil:
    visible: "Dispute status"
    timeout: 3000
