appId: ${APP_ID}
name: "Auth - Login (error: wrong password)"
env:
  APP_ID: com.rentmy.app
  RENTER_EMAIL: bob@test.com
  WRONG_PASSWORD: wrongpassword
---
- clearState
- clearKeychain

- launchApp

# Expo Dev Client: tap the dev server to load the JS bundle
- tapOn:
    text: "http://localhost:8081"
    retryTapIfNoChange: false

# Dismiss Expo Dev Client welcome overlay
- extendedWaitUntil:
    visible: "Continue"
    timeout: 15000
- tapOn: "Continue"

# Close the Expo dev tools panel (tap × button)
- tapOn:
    point: "88%, 37%"

# Wait for the login screen to appear
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000

# Enter valid email but wrong password
- tapOn:
    id: "input-email"
- inputText: ${RENTER_EMAIL}

- tapOn:
    id: "input-password"
- eraseText: 30
- inputText: ${WRONG_PASSWORD}

- tapOn:
    point: "50%, 20%"

- tapOn:
    id: "btn-sign-in"

# Backend returns 401 → login.tsx sets apiError → error-message appears
- extendedWaitUntil:
    visible:
      id: "error-message"
    timeout: 10000

# Still on login screen
- assertVisible:
    id: "screen-login"
