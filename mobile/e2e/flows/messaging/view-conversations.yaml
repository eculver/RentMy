appId: ${APP_ID}
name: "Messaging - View conversations list (happy path)"
env:
  APP_ID: com.rentmy.app
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Prerequisites:
#   - Backend running
#   - App built with dev client: npx expo run:ios
#   - setup.sh run (test accounts + bookings + messages exist)
#
# Flow: login as renter → navigate to Messages tab → conversation list renders
#       → tap the seeded conversation → thread opens with pre-seeded messages.

# ── 1. Login as renter ───────────────────────────────────────────────────────
- runFlow: ../../helpers/login-as-renter.yaml

# ── 2. Navigate to Messages tab ──────────────────────────────────────────────
- tapOn:
    text: "Messages, tab.*"

- extendedWaitUntil:
    visible:
      id: "screen-messages"
    timeout: 5000

# ── 3. Conversation list renders with at least one row ───────────────────────
- extendedWaitUntil:
    visible:
      id: "conversation-list"
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: "conversation-row"
    timeout: 5000

# ── 4. Tap the first conversation row → thread opens ─────────────────────────
- tapOn:
    id: "conversation-row"

- extendedWaitUntil:
    visible:
      id: "screen-conversation"
    timeout: 5000

# ── 5. Message list renders with pre-seeded messages ─────────────────────────
- extendedWaitUntil:
    visible:
      id: "message-list"
    timeout: 5000

# At least one received message bubble (from the host) should be visible.
- extendedWaitUntil:
    visible:
      id: "message-bubble-received"
    timeout: 5000
