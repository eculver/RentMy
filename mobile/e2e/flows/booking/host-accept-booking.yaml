appId: ${APP_ID}
name: "Booking - Host accepts booking request"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
  HOST_EMAIL: alice@test.com
  HOST_PASSWORD: password123
---
# Prerequisites:
#   - Backend running with E2E_MODE=true
#   - App built with EXPO_PUBLIC_E2E_MODE=true
#
# Seeds a REQUESTED booking, then logs in as host and accepts it.
# Verifies that status changes to ACCEPTED.

# ── 1. Seed a REQUESTED booking ──────────────────────────────────────────────
- runScript: e2e/scripts/seed-booking.js
  env:
    API_URL: ${API_URL}
    RENTER_EMAIL: ${RENTER_EMAIL}

# ── 2. Login as host ─────────────────────────────────────────────────────────
- runFlow: e2e/helpers/login-as-host.yaml

# ── 3. Navigate to Rentals tab ───────────────────────────────────────────────
- tapOn: "Rentals"

- assertVisible:
    id: "screen-rentals"
    timeout: 5000

# ── 4. Tap the incoming request row ──────────────────────────────────────────
- tapOn:
    id: "rental-row"

- assertVisible:
    id: "screen-booking-status"
    timeout: 5000

# ── 5. Host sees the IncomingRequest card with Accept / Decline buttons ───────
- assertVisible:
    id: "incoming-request-timer"

- assertVisible:
    id: "btn-accept"

# ── 6. Accept the booking ────────────────────────────────────────────────────
- tapOn:
    id: "btn-accept"

# ── 7. Status changes to "Booking accepted" ──────────────────────────────────
- assertVisible:
    id: "booking-status-label"
    timeout: 8000

- assertVisible: "Booking accepted"
