services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rentmy
      POSTGRES_PASSWORD: rentmy
      POSTGRES_DB: rentmy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentmy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  soketi:
    image: quay.io/soketi/soketi:latest
    ports:
      - "6001:6001"
    environment:
      SOKETI_DEFAULT_APP_ID: app-id
      SOKETI_DEFAULT_APP_KEY: app-key
      SOKETI_DEFAULT_APP_SECRET: app-secret
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6001 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  cv-service:
    build:
      context: ./cv-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OSRM self-hosted routing service (optional — requires pre-processed data).
  # Run `scripts/osrm-prepare.sh` once to build /data/region.osrm, then start
  # this service with: docker compose --profile osrm up -d
  osrm:
    profiles: ["osrm"]
    image: osrm/osrm-backend:latest
    ports:
      - "5000:5000"
    volumes:
      - osrm_data:/data
    command: osrm-routed --algorithm mld /data/region.osrm
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/nearest/v1/driving/-118.24,34.05 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  osrm_data:
