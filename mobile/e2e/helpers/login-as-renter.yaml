appId: ${APP_ID}
name: "Helper - Login as renter (bob@test.com)"
env:
  APP_ID: com.rentmy.app
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Reusable helper: logs in as the seeded renter account.
# Call with runFlow before flows that require an authenticated renter.

# Explicitly stop the app process first to let the simulator tear down XPC
# connections cleanly.  Without this, rapid clearState→launchApp cycles
# accumulate stale XPC handles that eventually trigger EXC_GUARD crashes.
- stopApp
- clearState
- clearKeychain

- launchApp

# Expo Dev Client: tap the dev server to load the JS bundle
- tapOn:
    text: "http://localhost:8081"
    retryTapIfNoChange: false

# Dismiss Expo Dev Client welcome overlay
- extendedWaitUntil:
    visible: "Continue"
    timeout: 15000
- tapOn: "Continue"

# Close the Expo dev tools panel (tap × button)
- tapOn:
    point: "88%, 37%"

# Wait for the login screen
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000

- tapOn:
    id: "input-email"
- inputText: ${RENTER_EMAIL}

- tapOn:
    id: "input-password"
- eraseText: 30
- inputText: ${RENTER_PASSWORD}

- tapOn:
    point: "50%, 20%"

- tapOn:
    id: "btn-sign-in"

# Dismiss iOS "Save Password?" prompt if it appears
- extendedWaitUntil:
    visible: "Not Now"
    timeout: 10000
    optional: true
- tapOn:
    text: "Not Now"
    optional: true

# Wait for the feed screen
- extendedWaitUntil:
    visible:
      id: "screen-feed"
    timeout: 10000
