appId: ${APP_ID}
name: "Auth - Register (validation: empty fields)"
env:
  APP_ID: com.rentmy.app
---
- clearState
- clearKeychain

- launchApp

# Expo Dev Client: tap the dev server to load the JS bundle
- tapOn:
    text: "http://localhost:8081"
    retryTapIfNoChange: false

# Dismiss Expo Dev Client welcome overlay
- extendedWaitUntil:
    visible: "Continue"
    timeout: 15000
- tapOn: "Continue"

# Close the Expo dev tools panel (tap × button)
- tapOn:
    point: "88%, 37%"

# Wait for the login screen to appear
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000

- tapOn:
    id: "btn-create-account"

- extendedWaitUntil:
    visible:
      id: "screen-register"
    timeout: 8000

# Submit with all fields empty — Zod validation should fire immediately
- tapOn:
    id: "btn-register"

# react-hook-form + Zod surfaces field errors inline on the inputs;
# the error text is rendered next to each field via the Input component.
# At minimum we assert the form did NOT submit (still on register screen).
- assertVisible:
    id: "screen-register"

# Now fill only email (invalid format) and submit — expect email error
- tapOn:
    id: "input-email"
- inputText: "not-an-email"

- tapOn:
    point: "50%, 20%"

- tapOn:
    id: "btn-register"

# Still on register screen; no API call made
- assertVisible:
    id: "screen-register"
