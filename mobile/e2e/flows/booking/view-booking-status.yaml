appId: ${APP_ID}
name: "Booking - View booking status (REQUESTED)"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Prerequisites:
#   - Backend running with seeded data (setup.sh seeds REQUESTED bookings)
#   - App built with dev client
#   - bob@test.com has at least one REQUESTED booking (from seed)
#
# Flow: login as renter → Rentals tab → tap a REQUESTED booking row →
#       assert status shows "Waiting for host" and Cancel button is visible.

# ── 1. Login as renter ───────────────────────────────────────────────────────
- runFlow: ../../helpers/login-as-renter.yaml

# ── 2. Navigate to Rentals tab ───────────────────────────────────────────────
- tapOn:
    text: "Rentals, tab.*"

- extendedWaitUntil:
    visible:
      id: "screen-rentals"
    timeout: 5000

# ── 3. Tap a REQUESTED booking row (use status text to find the right one) ───
- tapOn:
    id: "status-requested"

# ── 4. Assert booking status screen shows "Waiting for host" ─────────────────
- extendedWaitUntil:
    visible:
      id: "screen-booking-status"
    timeout: 5000

- extendedWaitUntil:
    visible:
      id: "booking-status-label"
    timeout: 8000

- assertVisible: "Waiting for host"

# ── 5. Cancel button is visible (booking is still pending) ───────────────────
- assertVisible:
    id: "btn-cancel-booking"
