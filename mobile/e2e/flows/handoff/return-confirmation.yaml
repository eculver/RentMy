appId: ${APP_ID}
name: "Handoff - Return confirmation (COMPLETED booking summary)"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Prerequisites:
#   - Backend running with E2E_MODE=true
#   - App built with EXPO_PUBLIC_E2E_MODE=true
#
# Seeds a COMPLETED booking and verifies the return-confirmation screen:
#   - Screen renders with "Return complete" status
#   - "Rate this rental" and "File a dispute" action buttons visible
#   - "Back to rentals" navigation works

# ── 1. Seed a COMPLETED booking ──────────────────────────────────────────────
- runFlow: e2e/helpers/seed-booking-completed.yaml

# ── 2. Login as renter ───────────────────────────────────────────────────────
- runFlow: e2e/helpers/login-as-renter.yaml

# ── 3. Navigate to Rentals tab ───────────────────────────────────────────────
- tapOn: "Rentals"

- assertVisible:
    id: "screen-rentals"
    timeout: 5000

# ── 4. Tap the COMPLETED rental row → return-confirmation ─────────────────────
- tapOn:
    id: "rental-row"

- assertVisible:
    id: "screen-return-confirmation"
    timeout: 6000

# ── 5. Assert return status renders ──────────────────────────────────────────
- assertVisible:
    id: "return-status-label"

- assertVisible: "Return complete"

# ── 6. Assert action buttons are visible ─────────────────────────────────────
- assertVisible:
    id: "btn-rate-rental"

- assertVisible:
    id: "btn-file-dispute"

- assertVisible:
    id: "btn-back-to-rentals"

# ── 7. Navigate back to rentals list ─────────────────────────────────────────
- tapOn:
    id: "btn-back-to-rentals"

- assertVisible:
    id: "screen-rentals"
    timeout: 5000
