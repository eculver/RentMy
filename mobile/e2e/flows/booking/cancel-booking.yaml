appId: ${APP_ID}
name: "Booking - Renter cancels booking request"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Prerequisites:
#   - Backend running with seeded data (setup.sh seeds REQUESTED bookings)
#   - App built with dev client
#   - bob@test.com has at least one REQUESTED booking (from seed)
#
# Flow: login as renter → Rentals tab → tap a REQUESTED booking row →
#       cancel → confirm in modal → verify status changes to "Booking cancelled".

# ── 1. Login as renter ───────────────────────────────────────────────────────
- runFlow: ../../helpers/login-as-renter.yaml

# ── 2. Navigate to Rentals tab ───────────────────────────────────────────────
- tapOn:
    text: "Rentals, tab.*"

- extendedWaitUntil:
    visible:
      id: "screen-rentals"
    timeout: 5000

# ── 3. Tap a REQUESTED booking row ───────────────────────────────────────────
- tapOn:
    id: "status-requested"

- extendedWaitUntil:
    visible:
      id: "screen-booking-status"
    timeout: 5000

# ── 4. Tap "Cancel booking" ──────────────────────────────────────────────────
- assertVisible:
    id: "btn-cancel-booking"

- tapOn:
    id: "btn-cancel-booking"

# ── 5. Confirm cancellation in the modal ─────────────────────────────────────
# The CancelConfirmation modal has "Keep booking" (dismiss) and "Cancel booking" (confirm).
- extendedWaitUntil:
    visible: "Cancel this booking?"
    timeout: 3000

- tapOn:
    id: "btn-confirm-cancel"

# ── 6. Status changes to "Booking cancelled" ─────────────────────────────────
- extendedWaitUntil:
    visible: "Booking cancelled"
    timeout: 8000

- assertVisible:
    id: "booking-status-label"
