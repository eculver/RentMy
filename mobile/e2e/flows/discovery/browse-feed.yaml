appId: ${APP_ID}
name: "Discovery - Browse feed (happy path)"
env:
  APP_ID: com.rentmy.app
  TEST_LATITUDE: "34.0522"
  TEST_LONGITUDE: "-118.2437"
---
# Set simulator GPS so the feed has a location for the discovery API
- setLocation:
    latitude: ${TEST_LATITUDE}
    longitude: ${TEST_LONGITUDE}

# Login as renter — feed is the default landing tab after login
- runFlow: ../../helpers/login-as-renter.yaml

# Feed tab should be active and visible
- extendedWaitUntil:
    visible:
      id: "screen-feed"
    timeout: 10000

# Wait for at least one listing card to appear
# (backend feed API + location must resolve)
- extendedWaitUntil:
    visible:
      id: "listing-card"
    timeout: 15000

# Scroll down to load more cards (exercises infinite-scroll pagination)
- scroll

# Pull-to-refresh: swipe down from near the top of the feed list
- swipe:
    direction: DOWN
    duration: 500

# Cards still visible after refresh
- extendedWaitUntil:
    visible:
      id: "listing-card"
    timeout: 10000

# Tap a listing card to navigate to the detail screen
- tapOn:
    id: "listing-card"

# Listing detail screen should render
- extendedWaitUntil:
    visible:
      id: "screen-listing-detail"
    timeout: 10000

# Navigate back using the native Stack header back button
- tapOn:
    text: "Back"

# Feed is visible again
- extendedWaitUntil:
    visible:
      id: "screen-feed"
    timeout: 8000
