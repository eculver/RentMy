appId: ${APP_ID}
name: "Helper - Seed a DISPUTED booking via API"
env:
  APP_ID: com.rentmy.app
  API_URL: http://localhost:8080
  RENTER_EMAIL: bob@test.com
---
# Creates a COMPLETED booking with a PENDING dispute, then sets the
# transaction status to DISPUTED so it appears in the Rentals list.
#
# Requires: backend running with E2E_MODE=true
#
# After this helper runs:
#   ${TRANSACTION_ID} — booking ID (status: DISPUTED)
#   ${DISPUTE_ID}     — dispute record ID (status: PENDING)

- runScript: e2e/scripts/seed-dispute.js
  env:
    API_URL: ${API_URL}
    RENTER_EMAIL: ${RENTER_EMAIL}
