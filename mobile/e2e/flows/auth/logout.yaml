appId: ${APP_ID}
name: "Auth - Logout"
env:
  APP_ID: com.rentmy.app
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
- clearState
- clearKeychain

- launchApp

# Expo Dev Client: tap the dev server to load the JS bundle
- tapOn:
    text: "http://localhost:8081"
    retryTapIfNoChange: false

# Dismiss Expo Dev Client welcome overlay
- extendedWaitUntil:
    visible: "Continue"
    timeout: 15000
- tapOn: "Continue"

# Close the Expo dev tools panel (tap × button)
- tapOn:
    point: "88%, 37%"

# Wait for the login screen to appear
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000

# Log in first
- tapOn:
    id: "input-email"
- inputText: ${RENTER_EMAIL}

- tapOn:
    id: "input-password"
- eraseText: 30
- inputText: ${RENTER_PASSWORD}

- tapOn:
    point: "50%, 20%"

- tapOn:
    id: "btn-sign-in"

# Dismiss iOS "Save Password?" prompt if it appears
- extendedWaitUntil:
    visible: "Not Now"
    timeout: 10000
    optional: true
- tapOn:
    text: "Not Now"
    optional: true

# Wait for the feed screen
- extendedWaitUntil:
    visible:
      id: "screen-feed"
    timeout: 10000

# Navigate to Profile tab (accessibility text: "Profile, tab, 6 of 6")
- tapOn:
    text: "Profile, tab.*"

- extendedWaitUntil:
    visible:
      id: "screen-profile"
    timeout: 8000

# Tap Sign Out
- tapOn:
    id: "btn-sign-out"

# Root layout detects isAuthenticated=false and redirects to login
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 8000

# Verify tabs are inaccessible — login screen is the only thing visible
- assertNotVisible:
    id: "screen-feed"
- assertNotVisible:
    id: "screen-profile"
