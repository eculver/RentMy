appId: ${APP_ID}
name: "Auth - Register (happy path)"
env:
  APP_ID: com.rentmy.app
---
# Generate a unique email so this test is idempotent across runs.
- evalScript: ${output.UNIQUE_EMAIL = 'e2e+' + Date.now() + '@test.com'}

- clearState
- clearKeychain

- launchApp

# Expo Dev Client: tap the dev server to load the JS bundle
- tapOn:
    text: "http://localhost:8081"
    retryTapIfNoChange: false

# Dismiss Expo Dev Client welcome overlay
- extendedWaitUntil:
    visible: "Continue"
    timeout: 15000
- tapOn: "Continue"

# Close the Expo dev tools panel (tap × button)
- tapOn:
    point: "88%, 37%"

# Wait for the login screen to appear
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000

# Navigate to register
- tapOn:
    id: "btn-create-account"

- extendedWaitUntil:
    visible:
      id: "screen-register"
    timeout: 8000

# Fill the registration form — tap each field directly, no hideKeyboard.
- tapOn:
    id: "input-name"
- inputText: "E2E Test User"

- tapOn:
    id: "input-email"
- inputText: ${output.UNIQUE_EMAIL}

# For the password field, tap, clear any iOS autofill, then type.
- tapOn:
    id: "input-password"
- eraseText: 30
- inputText: "Password123"

# Dismiss keyboard by tapping the subtitle text (not the ambiguous "Create Account")
- tapOn: "Join RentMy to start renting"

# Submit
- tapOn:
    id: "btn-register"

# Dismiss iOS "Save Password?" prompt if it appears.
- extendedWaitUntil:
    visible: "Not Now"
    timeout: 10000
    optional: true
- tapOn:
    text: "Not Now"
    optional: true

# On success, the auth store logs the user in and the root layout
# redirects to tabs → feed screen.
- extendedWaitUntil:
    visible:
      id: "screen-feed"
    timeout: 15000
