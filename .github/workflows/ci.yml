name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Lint + Build ──────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  # ── Backend: Unit Tests ────────────────────────────────────────────────────
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: rentmy
          POSTGRES_PASSWORD: rentmy
          POSTGRES_DB: rentmy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rentmy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./internal/... -v -count=1 -timeout=120s
        env:
          DATABASE_URL: postgres://rentmy:rentmy@localhost:5432/rentmy?sslmode=disable
          REDIS_URL: redis://localhost:6379

  # ── Backend: Integration Tests ─────────────────────────────────────────────
  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test ./tests/integration/... -v -count=1 -timeout=300s
        env:
          # testcontainers-go uses the Docker socket available on ubuntu-latest runners.
          # Ryuk (the resource reaper) is disabled because it requires a privileged container
          # which is not available in standard GitHub Actions runners.
          TESTCONTAINERS_RYUK_DISABLED: "true"
          # Suppress testcontainers verbose startup logs in CI output.
          TESTCONTAINERS_RYUK_VERBOSE: "false"

  # ── Mobile: TypeScript + Lint ──────────────────────────────────────────────
  mobile-lint:
    name: Mobile TypeScript & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint 2>/dev/null || echo "Lint config not yet set up — skipping"

  # ── Mobile: Tests ──────────────────────────────────────────────────────────
  mobile-test:
    name: Mobile Tests
    runs-on: ubuntu-latest
    needs: mobile-lint
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --ci --coverage --verbose
