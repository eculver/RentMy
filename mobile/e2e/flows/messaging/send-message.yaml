appId: ${APP_ID}
name: "Messaging - Send a message (happy path)"
env:
  APP_ID: com.rentmy.app
  RENTER_EMAIL: bob@test.com
  RENTER_PASSWORD: password123
---
# Prerequisites:
#   - Backend running
#   - App built with dev client: npx expo run:ios
#   - setup.sh run (test accounts + bookings + messages exist)
#
# Flow: login as renter → Messages tab → open thread → type message → send
#       → message bubble appears.

# ── 1. Login as renter ───────────────────────────────────────────────────────
- runFlow: ../../helpers/login-as-renter.yaml

# ── 2. Navigate to Messages tab ──────────────────────────────────────────────
- tapOn:
    text: "Messages, tab.*"

- extendedWaitUntil:
    visible:
      id: "screen-messages"
    timeout: 5000

# ── 3. Open the seeded conversation ──────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "conversation-row"
    timeout: 5000

- tapOn:
    id: "conversation-row"

- extendedWaitUntil:
    visible:
      id: "screen-conversation"
    timeout: 5000

# ── 4. Type a message in the input field ─────────────────────────────────────
- tapOn:
    id: "input-message"

- inputText: "Hi, is this still available?"

# ── 5. Tap the send button ───────────────────────────────────────────────────
- tapOn:
    id: "btn-send-message"

# ── 6. Sent message bubble appears in the thread ─────────────────────────────
# The renter's outgoing message should appear as an "own" bubble.
- extendedWaitUntil:
    visible:
      id: "message-bubble-own"
    timeout: 8000
